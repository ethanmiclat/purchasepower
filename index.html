<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purchasing Power - what your salary is really worth, city to city</title>
    <meta
      name="description"
      content="See what your salary is actually worth in another U.S. city. Compare equivalent salaries across 386 metro areas with official BEA price data, and see whether housing, goods, or services drive the difference."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Purchasing Power" />
    <meta
      property="og:description"
      content="What is your salary really worth in another city? Compare purchasing power across 386 U.S. metros using official government price data."
    />
    <meta property="og:image" content="/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <script>
      // GitHub Pages SPA redirect: reconstruct the real URL that 404.html
      // encoded into the query string before BrowserRouter mounts.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
